<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GanyoKripto | Fast Data & Services</title>

<!-- FIX ICONS -->
<link rel="stylesheet" href="https://cloudflare.com">

<style>
:root { 
--primary:#28a745; 
--accent:#ffc107; 
--bg:#28a745; 
--text:#ffffff; 
--card-bg:#ffffff;
}

body {
font-family:'Segoe UI',sans-serif;
margin:0;
background:var(--bg);
color:var(--text);
}

header {
background:#fff;
padding:1rem 5%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo { color:var(--primary); font-weight:bold; font-size:1.4rem; }
.motto { color:var(--accent); font-weight:bold; }

.order-section {
background:#fff;
padding:1.5rem;
border-radius:20px;
margin:15px 5%;
color:#333;
text-align:center;
}

.network-grid { display:flex; gap:8px; justify-content:center; }
.net-btn { padding:8px 15px; border:2px solid #eee; border-radius:8px; cursor:pointer; font-weight:bold; }
.net-btn.active { background:#e8f5e9; border-color:var(--primary); }

.package-grid {
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin:15px 0;
}

.pkg-btn {
padding:10px;
border:1px solid #ddd;
border-radius:8px;
cursor:pointer;
font-size:0.8rem;
background:#f9f9f9;
}
.pkg-btn.active {
background:var(--primary);
color:white;
}

.input-phone {
padding:12px;
width:100%;
max-width:280px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
text-align:center;
}

.order-btn {
background:#25d366;
color:white;
padding:12px;
border-radius:50px;
border:none;
cursor:pointer;
width:100%;
max-width:250px;
font-weight:bold;
font-size:1rem;
}

.order-count { font-size: 0.85rem; color: #28a745; margin-top: 10px; font-weight: bold; }

.services {
padding:1rem 5%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:1rem;
}

.card {
background:white;
padding:1rem;
border-radius:15px;
text-align:center;
color:#333;
}

.card a {
display:inline-block;
margin-top:10px;
color:var(--primary);
font-weight:bold;
text-decoration:none;
border:1px solid var(--primary);
padding:5px 15px;
border-radius:5px;
}

.vboost-box {
margin:15px 5%;
padding:1rem;
border:2px solid var(--accent);
text-align:center;
border-radius:15px;
}

#timer { font-size:1.6rem; font-weight:bold; }

.quiz-container {
background:#fff;
padding:1rem;
margin:15px 5%;
border-radius:15px;
color:#333;
text-align:center;
}

.option-btn {
display:block;
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
background:#fff;
}

.score { font-weight:bold; margin-top:10px; color:var(--primary); }

.footer { text-align:center; padding:20px; font-size:0.9rem; }
</style>
</head>

<body>

<header>
<div class="logo">GanyoKripto</div>
<div class="motto">Knowledge is Money</div>
</header>

<!-- ORDER -->
<section class="order-section">
<h2>Buy Cheap Data</h2>

<div class="network-grid">
<div class="net-btn active" onclick="setNet('MTN',this)">MTN</div>
<div class="net-btn" onclick="setNet('Telecel',this)">Telecel</div>
<div class="net-btn" onclick="setNet('AirtelTigo',this)">AirtelTigo</div>
</div>

<div class="package-grid" id="pkgGrid"></div>

<input type="number" id="orderPhone" class="input-phone" placeholder="Recipient Number">

<button class="order-btn" onclick="sendOrder()">Place Order Now</button>
<div class="order-count">Total Orders: <span id="totalOrders">0</span></div>
</section>

<!-- SERVICES -->
<div class="services">
<div class="card">
<h3>DeFi Portal</h3>
<p>Check your strategy</p>
<a href="https://tactics-strategy.com" target="_blank">Enter</a>
</div>

<div class="card">
<h3>Academy</h3>
<p>Learn Digital Wealth</p>
<a href="https://v-academy.top" target="_blank">Login</a>
</div>

<div class="card">
<h3>Community</h3>
<p>Join the conversation</p>
<a href="https://whatsapp.com" target="_blank">Join</a>
</div>
</div>

<!-- TIMER -->
<div class="vboost-box">
<h3>🚀 V-BOOST LAUNCH</h3>
<div id="timer">00:00:00:00</div>
</div>

<!-- QUIZ -->
<section class="quiz-container">
<h3>🧠 Crypto Quiz</h3>

<p id="qText" style="font-weight:bold;"></p>
<div id="qOptions"></div>
<p id="qRes" style="font-weight:bold; height:20px;"></p>

<div class="score">Score: <span id="score">0</span></div>

<button onclick="nextQ()" style="margin-top:10px; padding:5px 15px; border-radius:5px; border:none; background:#6c757d; color:white; cursor:pointer;">Next Question</button>
</section>

<div class="footer">
Support: 0505332010
</div>

<script>

// PACKAGES
let activeNet='MTN', activePkg='', activePrice='';

const packages=[
{v:"1GB",p:"5.5"},{v:"2GB",p:"10"},{v:"3GB",p:"15"},
{v:"4GB",p:"20"},{v:"5GB",p:"25"},{v:"6GB",p:"30"},
{v:"7GB",p:"35"},{v:"8GB",p:"40"},{v:"10GB",p:"45"}
];

function renderPackages(){
document.getElementById('pkgGrid').innerHTML = packages.map(p=>`
<div class="pkg-btn" onclick="setPkg('${p.v}','¢${p.p}',this)">
${p.v}<br>¢${p.p}
</div>`).join('');
}

function setNet(net,el){
activeNet=net;
document.querySelectorAll('.net-btn').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
}

function setPkg(pkg,price,el){
activePkg=pkg;
activePrice=price;
document.querySelectorAll('.pkg-btn').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
}

// ORDER COUNT LOGIC (ONLY ON TAP)
let orderCount = parseInt(localStorage.getItem('ganyoOrders')) || 142;
document.getElementById('totalOrders').innerText = orderCount;

// WHATSAPP ORDER
function sendOrder(){
const phone=document.getElementById('orderPhone').value;

if(!activePkg || !phone){
alert("Select bundle and enter number");
return;
}

// Update count
orderCount++;
localStorage.setItem('ganyoOrders', orderCount);
document.getElementById('totalOrders').innerText = orderCount;

const msg=`NEW DATA ORDER
Network: ${activeNet}
Phone: ${phone}
Bundle: ${activePkg} (${activePrice})`;

window.open("https://wa.me"+encodeURIComponent(msg));
}

// TIMER
const target=new Date("May 20, 2026 00:00:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let diff=target-now;

if(diff<0){
document.getElementById("timer").innerText="LIVE";
return;
}

let d=Math.floor(diff/86400000);
let h=Math.floor((diff%86400000)/3600000);
let m=Math.floor((diff%3600000)/60000);
let s=Math.floor((diff%60000)/1000);

document.getElementById("timer").innerText=
`${d}:${h<10?'0'+h:h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
},1000);

// QUIZ (Expand this list to 100 as needed)
const quiz=[
{q:"What is known as 'Digital Gold'?",o:["Bitcoin","Ethereum","Solana"],c:0},
{q:"What does NFT stand for?",o:["Non-Fungible Token","National Fund Trust"],c:0},
{q:"DeFi stands for?",o:["Decentralized Finance","Digital Finance"],c:0},
{q:"Who created Bitcoin?",o:["Satoshi Nakamoto","Elon Musk"],c:0}
];

let score=0, curQ=0;

function nextQ(){
curQ=Math.floor(Math.random()*quiz.length);
let q=quiz[curQ];
document.getElementById("qText").innerText=q.q;
document.getElementById("qOptions").innerHTML=q.o.map((opt,i)=>`
<button class="option-btn" onclick="check(${i})">${opt}</button>`).join('');
document.getElementById("qRes").innerText="";
}

function check(i){
if(i===quiz[curQ].c){
score++;
document.getElementById("qRes").innerText="Correct!";
document.getElementById("qRes").style.color="green";
}else{
document.getElementById("qRes").innerText="Wrong!";
document.getElementById("qRes").style.color="red";
}
document.getElementById("score").innerText=score;
}

renderPackages();
nextQ();

</script>

</body>
</html>
