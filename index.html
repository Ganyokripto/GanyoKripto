<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganyo Digital | Order Data</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #22c55e; --bg: #0f172a; --card: #1e293b; --accent: #fbbf24; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding-bottom: 90px; }
        
        header { background: #fff; color: #0f172a; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--primary); font-weight: 800; font-size: 1.4rem; }
        
        .section { padding: 2rem 5%; }
        .center { text-align: center; }

        .order-card { background: white; color: #0f172a; padding: 2rem; border-radius: 20px; max-width: 450px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid var(--primary); }
        .payment-tag { background: #f0fdf4; border: 1px solid var(--primary); padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.4; }
        
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9rem; text-align: left; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        
        .wa-btn { 
            display: block; 
            background-color: var(--primary); 
            color: white; 
            padding: 16px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 1.1rem; 
            text-align: center; 
            margin-top: 25px; 
            transition: 0.3s; 
            cursor: pointer;
        }
        .wa-btn:hover { background-color: #16a34a; transform: translateY(-2px); }

        .pro-card { background: var(--card); padding: 1.5rem; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #334155; }
        .btn-link { display: inline-block; padding: 10px 20px; border: 2px solid var(--primary); color: white; text-decoration: none; border-radius: 25px; margin-top: 10px; font-weight: bold; }
        
        #timer { font-size: 1.4rem; color: var(--accent); font-weight: bold; font-family: monospace; }
        #bottomNav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        #bottomNav button { background: none; border: none; color: #64748b; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <div class="logo">GANYO DIGITAL</div>
    <div id="timer">00:00:00</div>
</header>

<section class="section center">
    <h1>Knowledge is Money</h1>
    <p style="color: #94a3b8;">Order your data bundle below.</p>

    <div class="order-card">
        <div class="payment-tag">
            <i class="fas fa-wallet"></i> Pay: <b>0242366444</b><br>
            Name: <b>Michael A. Believe</b>
        </div>

        <label>Number to receive data</label>
        <input type="tel" id="userPhone" placeholder="e.g. 024XXXXXXX" maxlength="10">

        <label>Network</label>
        <select id="userNetwork">
            <option value="MTN">MTN Ghana</option>
            <option value="Telecel">Telecel (Vodafone)</option>
            <option value="AirtelTigo">AirtelTigo</option>
        </select>

        <label>Data Bundle</label>
        <select id="userBundle">
            <option value="1GB (¢5.5)">1GB - ¢5.5</option>
            <option value="2GB (¢10)">2GB - ¢10</option>
            <option value="3GB (¢15)">3GB - ¢15</option>
            <option value="4GB (¢20)">4GB - ¢20</option>
            <option value="5GB (¢25)">5GB - ¢25</option>
            <option value="6GB (¢30)">6GB - ¢30</option>
            <option value="7GB (¢35)">7GB - ¢35</option>
            <option value="8GB (¢40)">8GB - ¢40</option>
            <option value="10GB (¢45)">10GB - ¢45</option>
        </select>

        <a id="whatsappLink" class="wa-btn" onclick="placeOrder()">
            <i class="fab fa-whatsapp"></i> PLACE ORDER NOW
        </a>
    </div>
</section>

<script>
function placeOrder() {
    const phone = document.getElementById('userPhone').value;
    const network = document.getElementById('userNetwork').value;
    const bundle = document.getElementById('userBundle').value;
    const adminWhatsApp = "233505332010";

    if (phone.length < 10) {
        alert("Please enter a valid 10-digit number.");
        return;
    }

    const rawMessage = "🚀 NEW DATA ORDER\n----------------------\n👤 Network: " + network + "\n📱 Recipient: " + phone + "\n📦 Bundle: " + bundle + "\n----------------------\nPaying to Michael A. Believe now.";
    
    const encodedMessage = encodeURIComponent(rawMessage);

    // ✅ FIXED LINE ONLY
    const finalUrl = "https://wa.me/" + adminWhatsApp + "?text=" + encodedMessage;

    window.open(finalUrl, "_blank");
}
</script>

</body>
</html>
