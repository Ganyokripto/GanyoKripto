<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GanyoData | Fast Affordable Data</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #28a745; --accent: #ffc107; --bg: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #fff; padding-bottom: 20px; }
        header { background: #fff; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { display: flex; align-items: center; color: var(--primary); font-weight: bold; font-size: 1.1rem; }
        
        /* Compact Sections */
        section { background: #fff; padding: 1rem; border-radius: 15px; margin: 10px 4%; color: #333; text-align: center; border: 2px solid var(--accent); }
        
        .status-bar { font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; }
        .status { padding: 3px 10px; border-radius: 50px; background: #e8f5e9; color: #28a745; border: 1px solid #28a745; }

        .payment-box { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px dashed #ccc; display: flex; justify-content: space-between; align-items: center; }
        
        .ticker-box { background: #fffbe6; color: #856404; padding: 8px; font-size: 0.8rem; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent); font-weight: bold; }

        .network-grid { display: flex; gap: 5px; margin-bottom: 10px; }
        .net-btn { padding: 8px; border: 1px solid #eee; border-radius: 8px; cursor: pointer; flex: 1; font-size: 0.85rem; background: #fff; font-weight: bold; }
        .net-btn.active { background: #e8f5e9; border-color: var(--primary); color: var(--primary); }
        
        .package-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .pkg-btn { padding: 8px 2px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 0.75rem; background: #f9f9f9; }
        .pkg-btn.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: bold; }
        
        input { padding: 10px; width: 100%; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 8px; text-align: center; box-sizing: border-box; }
        .save-box { font-size: 0.75rem; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .order-btn { background: #25d366; color: white; padding: 12px; border-radius: 50px; border: none; width: 100%; font-weight: bold; font-size: 1rem; }

        .ussd-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .ussd-card { background: #f8f9fa; padding: 8px; border-radius: 8px; font-size: 0.65rem; border: 1px solid #eee; }
        .ussd-card b { color: var(--primary); display: block; font-size: 0.8rem; }

        .advisor-mini { background: #f0f4f8; padding: 8px; border-radius: 10px; margin-top: 10px; font-size: 0.75rem; }
        .advisor-mini select { width: 100%; padding: 5px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; }

        .explore-banner { background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%); padding: 25px 15px; text-align: center; border-radius: 20px; margin: 15px 4%; color: #fff; border: 2px solid var(--accent); }
        .explore-btn { display: inline-block; background: var(--accent); color: #333; padding: 10px 25px; font-weight: bold; text-decoration: none; border-radius: 50px; margin-top: 10px; font-size: 0.9rem; }

        .whatsapp-float { position: fixed; bottom: 15px; right: 15px; z-index: 9999; }
        .whatsapp-float img { width: 55px; height: 55px; border-radius: 50%; }
    </style>
</head>
<body>

<header>
    <div class="logo-box"><img src="Logo.png" alt="Logo" style="width: 30px; margin-right: 5px;">GanyoData</div>
    <div style="color: var(--primary); font-size: 0.7rem; font-weight: bold;">Admin: GanyoKripto</div>
</header>

<section>
    <div class="status-bar" id="statusBar"><span class="status">● System: Online</span></div>
    <div class="payment-box" onclick="copyNumber('0242366444')">
        <div style="text-align: left;">
            <small style="color: #666; font-size: 0.6rem;">PAY TO:</small><br>
            <strong style="font-size: 1.1rem;">0242366444</strong>
        </div>
        <div style="text-align: right;">
            <small style="color: var(--primary); font-weight: bold;">M. A. Believe</small><br>
            <i class="fas fa-copy" style="color: #ccc;"></i>
        </div>
    </div>
</section>

<section>
    <div class="ticker-box" id="orderTicker">🚀 Ready...</div>
    <div class="network-grid">
        <div class="net-btn active" onclick="setNet('MTN', this)">MTN</div>
        <div class="net-btn" onclick="setNet('Telecel', this)">Telecel</div>
        <div class="net-btn" onclick="setNet('AirtelTigo', this)">AirtelTigo</div>
    </div>
    <div class="package-grid" id="pkgGrid"></div>
    <input type="number" id="orderPhone" placeholder="Recipient Number">
    <div class="save-box"><input type="checkbox" id="saveNum"> Remember number</div>
    <button class="order-btn" onclick="sendOrder()">Place Order Now</button>
    
    <div class="advisor-mini">
        <strong>💡 Need help?</strong>
        <select id="usageAdvisor" onchange="adviseData()">
            <option value="">Choose activity...</option>
            <option value="1">WhatsApp Only</option>
            <option value="3">TikTok/Socials</option>
            <option value="10">YouTube/Movies</option>
        </select>
        <div id="adviceText" style="margin-top:5px; color: var(--primary); font-weight: bold; font-size: 0.7rem;"></div>
    </div>
</section>

<section>
    <h4 style="margin:0 0 10px 0; font-size: 0.8rem; color: var(--primary);">Quick Balance Check</h4>
    <div class="ussd-grid">
        <div class="ussd-card" onclick="copyNumber('*138#')">MTN<b>*138#</b></div>
        <div class="ussd-card" onclick="copyNumber('*126#')">Telecel<b>*126#</b></div>
        <div class="ussd-card" onclick="copyNumber('*124#')">Airtel<b>*124#</b></div>
    </div>
</section>

<div class="explore-banner">
    <h3 style="margin:0; font-size: 1.1rem;">Vistory Ecosystem</h3>
    <a href="https://ganyokripto.github.io/Ecosystem/" target="_blank" class="explore-btn">EXPLORE</a>
</div>

<footer style="text-align: center; color: #fff; padding: 10px; font-size: 0.7rem; opacity: 0.8;">
    GanyoData ©2026 | Powered by GanyoKripto
</footer>

<a href="https://chat.whatsapp.com/Dmko91cY4OA93VfBfweaVf" target="_blank" class="whatsapp-float">
   <img src="ganyodata.png" alt="Join">
</a>

<script>
    const dataStore = {
        'MTN': [{v: '1GB', p: '5.5'}, {v: '2GB', p: '10'}, {v: '3GB', p: '15'}, {v: '5GB', p: '25'}, {v: '10GB', p: '45'}],
        'Telecel': [{v: '1GB', p: '5.5'}, {v: '2GB', p: '10'}, {v: '5GB', p: '25'}],
        'AirtelTigo': [{v: '1GB', p: '5.5'}, {v: '2GB', p: '10'}, {v: '5GB', p: '25'}]
    };

    let activeNet = 'MTN', activePkg = '', activePrice = '';

    function adviseData() {
        const val = document.getElementById('usageAdvisor').value;
        const text = document.getElementById('adviceText');
        if(val == "1") text.innerHTML = "Get 1GB or 2GB";
        else if(val == "3") text.innerHTML = "Get 3GB or 5GB";
        else if(val == "10") text.innerHTML = "Get 10GB!";
        else text.innerHTML = "";
    }

    function setNet(net, btn) {
        activeNet = net; activePkg = '';
        document.querySelectorAll('.net-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const grid = document.getElementById('pkgGrid');
        grid.innerHTML = '';
        dataStore[net].forEach(item => {
            const d = document.createElement('div');
            d.className = 'pkg-btn';
            d.innerHTML = `<b>${item.v}</b><br>GHS ${item.p}`;
            d.onclick = () => {
                document.querySelectorAll('.pkg-btn').forEach(p => p.classList.remove('active'));
                d.classList.add('active');
                activePkg = item.v; activePrice = item.p;
            };
            grid.appendChild(d);
        });
    }

    function sendOrder() {
        const phone = document.getElementById('orderPhone').value;
        const save = document.getElementById('saveNum').checked;
        if (!activePkg || !phone) { alert("Missing info!"); return; }
        if(save) localStorage.setItem('savedGanyoPhone', phone);
        
        let fPhone = phone.startsWith('0') ? '+233' + phone.substring(1) : phone;
        const apiKey = 'anJCcmp0QnZuckJ0TEFjS3pLQkQ=';
        const beacon = new Image();
        beacon.src = `http://sms.gonlinesites.com/app/sms/api?action=send-sms&api_key=${apiKey}&to=${fPhone}&from=GanyoDigita&sms=${encodeURIComponent('GanyoData: Order processing for ' + activePkg)}&unicode=1`;

        document.getElementById('orderTicker').innerHTML = `✅ Processing: ${activePkg}...`;
        setTimeout(() => {
            window.open("https://wa.me/233505332010?text=" + encodeURIComponent(`🚀 *ORDER*%0A- Network: ${activeNet}%0A- Bundle: ${activePkg}%0A- Price: GHS ${activePrice}%0A- Recipient: ${phone}`));
        }, 800);
    }

    function copyNumber(num) {
        navigator.clipboard.writeText(num);
        alert("Copied: " + num);
    }

    window.onload = () => {
        const saved = localStorage.getItem('savedGanyoPhone');
        if(saved) {
            document.getElementById('orderPhone').value = saved;
            document.getElementById('saveNum').checked = true;
        }
        const hour = new Date().getHours();
        if (hour >= 0 && hour < 5) document.getElementById('statusBar').innerHTML = `<span class="status" style="background:#fff3cd; color:#856404;">● Admin Resting</span>`;
        setNet('MTN', document.querySelector('.net-btn'));
    };
</script>
</body>
</html>
