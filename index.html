<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganyo Digital | Order Data</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root { --primary: #22c55e; --bg: #0f172a; --card: #1e293b; --accent: #fbbf24; }

body {
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--bg);
color:white;
padding-bottom:90px;
}

header {
background:#fff;
color:#0f172a;
padding:1rem 5%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.logo { color:var(--primary); font-weight:800; }

.section { padding:2rem 5%; }
.center { text-align:center; }

.order-card {
background:white;
color:#0f172a;
padding:2rem;
border-radius:20px;
max-width:450px;
margin:auto;
border:2px solid var(--primary);
}

input, select {
width:100%;
padding:12px;
margin-top:5px;
border-radius:10px;
}

.wa-btn {
display:block;
background:var(--primary);
color:white;
padding:16px;
border-radius:12px;
text-align:center;
margin-top:20px;
cursor:pointer;
}

.pro-card {
background:var(--card);
padding:1.5rem;
border-radius:15px;
margin-bottom:15px;
text-align:center;
}

#timer {
font-family:monospace;
color:var(--accent);
}

#bottomNav {
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:10px;
}

.game-btn {
width:100%;
padding:12px;
margin:6px 0;
background:#334155;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.score {
margin-top:10px;
font-weight:bold;
color:var(--primary);
}

</style>
</head>

<body>

<header>
<div class="logo">GANYO DIGITAL</div>
<div id="timer">00:00:00</div>
</header>

<section class="section center">
<h1>Knowledge is Money</h1>

<div class="order-card">

<label>Phone</label>
<input type="tel" id="userPhone">

<label>Network</label>
<select id="userNetwork">
<option>MTN</option>
<option>Telecel</option>
<option>AirtelTigo</option>
</select>

<label>Bundle</label>
<select id="userBundle">
<option>1GB (¢5.5)</option>
<option>2GB (¢10)</option>
<option>3GB (¢15)</option>
</select>

<div class="wa-btn" onclick="placeOrder()">ORDER NOW</div>

</div>
</section>

<section class="section" id="portal">
<div class="pro-card">
<h3>DeFi Portal</h3>
<a href="https://tactics-strategy.com" target="_blank">Enter</a>
</div>

<div class="pro-card">
<h3>Academy</h3>
<a href="https://v-academy.top" target="_blank">Enter</a>
</div>
</section>

<section class="section center" id="quiz">
<h2>🧠 Quiz</h2>

<p id="qText"></p>
<div id="qOptions"></div>
<p id="qRes"></p>

<div class="score">Score: <span id="score">0</span></div>

<button onclick="nextQ()">Next Question</button>

</section>

<div id="bottomNav">
<button onclick="window.scrollTo(0,0)">Home</button>
<button onclick="document.getElementById('portal').scrollIntoView()">Portal</button>
<button onclick="document.getElementById('quiz').scrollIntoView()">Quiz</button>
</div>

<script>

// ===== ORDER =====
function placeOrder(){
const phone=document.getElementById('userPhone').value;
const network=document.getElementById('userNetwork').value;
const bundle=document.getElementById('userBundle').value;

if(phone.length<10){
alert("Enter valid number");
return;
}

const msg=`NEW ORDER\nNetwork:${network}\nPhone:${phone}\nBundle:${bundle}`;
window.open("https://wa.me/233505332010?text="+encodeURIComponent(msg));
}

// ===== TIMER =====
const targetDate=new Date("May 20, 2026 00:00:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let diff=targetDate-now;

if(diff<0){
document.getElementById("timer").innerText="LIVE";
return;
}

let h=Math.floor(diff/3600000);
let m=Math.floor((diff%3600000)/60000);
let s=Math.floor((diff%60000)/1000);

document.getElementById("timer").innerText=
h+":"+(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);

},1000);


// ===== QUIZ + SCORE =====
const quizzes=[
{q:"Bitcoin is?",o:["Crypto","Bank","App"],c:0},
{q:"NFT means?",o:["Token","Non-Fungible Token","Coin"],c:1},
{q:"HODL means?",o:["Hold","Sell","Trade"],c:0}
];

let curQ=0;
let score=0;

function nextQ(){
curQ=Math.floor(Math.random()*quizzes.length);
let q=quizzes[curQ];

document.getElementById("qText").innerText=q.q;

document.getElementById("qOptions").innerHTML=q.o.map((opt,i)=>
`<button class="game-btn" onclick="checkQ(${i})">${opt}</button>`
).join('');

document.getElementById("qRes").innerText="";
}

function checkQ(i){
if(i===quizzes[curQ].c){
score++;
document.getElementById("qRes").innerText="Correct";
}else{
document.getElementById("qRes").innerText="Wrong";
}

document.getElementById("score").innerText=score;
}

nextQ();

</script>

</body>
</html>
